<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Line Fitness Lebu | System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">LIFE LINE <span>FITNESS</span></div>
        <a href="tel:0911182141" class="nav-phone">091 118 2141</a>
    </nav>

    <header class="hero">
        <h1>LEBU BRANCH</h1>
        <p>GYM • STEAM • KICKBOXING</p>
    </header>

    <section id="registration">
        <div class="container">
            <h2>Member <span>Registration</span></h2>
            <form id="regForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>Service Plan</label>
                    <select id="service">
                        <option value="Gym Only">Gym Only</option>
                        <option value="Kickboxing">Kickboxing Training</option>
                        <option value="Steam Room">Steam & Recovery</option>
                    </select>
                </div>
                <button type="submit" class="btn">Register</button>
                <div id="status"></div>
            </form>
        </div>
    </section>

    <section id="admin">
        <button onclick="toggleAdmin()" id="adminBtn" class="admin-access-btn">[ Admin Access ]</button>
        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h2>Registered Members</h2>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Service</th>
                            <th>Date Joined</th>
                        </tr>
                    </thead>
                    <tbody id="memberList"></tbody>
                </table>
            </div>
            <button onclick="clearData()" class="clear-btn">Clear All Data</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
