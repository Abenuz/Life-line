<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Line Fitness | Lebu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbbf24; --black: #000; --deep: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--black); color: white; scroll-behavior: smooth; }

        /* Modern Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.2rem; }
        .logo span { color: var(--gold); }
        .phone-btn { background: var(--gold); color: black; padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* Video Section */
        .video-section { height: 80vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #111 0%, #000 100%); }
        .phone-mockup { width: 320px; height: 580px; background: #0a0a0a; border: 4px solid #222; border-radius: 35px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(251, 191, 36, 0.1); }
        .video-content { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .play-icon { font-size: 5rem; color: #222; margin-bottom: 20px; }
        .video-info { position: absolute; bottom: 30px; left: 20px; text-align: left; }
        .video-info h4 { margin-bottom: 5px; }
        .video-info p { font-size: 0.8rem; color: #aaa; }

        /* Pricing Section */
        .pricing { padding: 5rem 5%; text-align: center; }
        .pricing h2 { margin-bottom: 3rem; font-size: 2.5rem; }
        .pricing h2 span { color: var(--gold); }
        .cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
        .card { background: #0d0d0d; padding: 3rem 2rem; border-radius: 25px; width: 300px; border: 1px solid #1a1a1a; transition: 0.3s; }
        .card.featured { border: 2px solid var(--gold); transform: scale(1.05); }
        .price { font-size: 3.5rem; font-weight: 800; margin: 1rem 0; }
        .price small { font-size: 1rem; color: #555; }
        .join-btn { display: block; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        .gold-btn { background: var(--gold); color: black; }
        .outline-btn { border: 1px solid var(--gold); color: var(--gold); }

        /* Form */
        .register { padding: 5rem 5%; background: #050505; }
        .form-box { max-width: 450px; margin: 0 auto; background: #111; padding: 40px; border-radius: 30px; border: 1px solid #222; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; border-radius: 10px; cursor: pointer; }

        footer { padding: 40px; text-align: center; color: #222; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">LIFE LINE <span>FITNESS</span></div>
        <a href="tel:0911182141" class="phone-btn"><i class="fas fa-phone"></i> 0911182141</a>
    </nav>

    <section class="video-section">
        <div class="phone-mockup">
            <div class="video-content">
                <i class="fas fa-play-circle play-icon"></i>
                <div class="video-info">
                    <h4>@lifeline_fitness_lebu</h4>
                    <p>Level up your game at Gidami Business Center! #EthiopiaGym</p>
                </div>
            </div>
        </div>
    </section>

    <section class="pricing">
        <h2>Pricing <span>Plans</span></h2>
        <div class="cards">
            <div class="card">
                <h3>Monthly Gym</h3>
                <div class="price">5,000<br><small>ETB</small></div>
                <a href="#join" class="join-btn outline-btn">Join Now</a>
            </div>
            <div class="card featured">
                <h3 style="color: var(--gold)">Pro Athlete</h3>
                <div class="price">6,500<br><small>ETB</small></div>
                <a href="#join" class="join-btn gold-btn">Join Now</a>
            </div>
        </div>
    </section>

    <section id="join" class="register">
        <div class="form-box">
            <h2 style="margin-bottom: 20px;">Join the <span>Family</span></h2>
            <form id="gymForm">
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="tel" id="userPhone" placeholder="Phone Number" required>
                <select id="userPlan">
                    <option value="Monthly">Monthly Gym - 5,000 ETB</option>
                    <option value="Pro">Pro Athlete - 6,500 ETB</option>
                </select>
                <button type="submit" class="submit-btn">Submit Registration</button>
            </form>
        </div>
    </section>

    <footer onclick="adminAccess()">
        <p>&copy; 2026 Life Line Fitness Lebu</p>
    </footer>

    <script>
        // Form Logic
        document.getElementById('gymForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const member = {
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                plan: document.getElementById('userPlan').value
            };
            let list = JSON.parse(localStorage.getItem('gymMembers')) || [];
            list.push(member);
            localStorage.setItem('gymMembers', JSON.stringify(list));
            alert("Registration successful! The gym will call you.");
            this.reset();
        });

        // Secret Admin Logic
        let count = 0;
        function adminAccess() {
            count++;
            if(count >= 5) {
                count = 0;
                if(prompt("Enter Admin PIN:") === "admin123") {
                    const data = localStorage.getItem('gymMembers');
                    alert("Member Leads:\n" + (data ? data : "No registrations yet."));
                }
            }
        }
    </script>
</body>
</html>
