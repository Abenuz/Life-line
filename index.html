<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Line Fitness | Lebu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbbf24; --black: #000; --deep: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--black); color: white; scroll-behavior: smooth; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: rgba(0,0,0,0.95); border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.2rem; }
        .logo span { color: var(--gold); }
        .phone-btn { background: var(--gold); color: black; padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* TikTok Section */
        .video-section { padding: 4rem 0; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle, #111 0%, #000 100%); }
        .phone-mockup { width: 325px; height: 600px; background: #000; border: 8px solid #1a1a1a; border-radius: 40px; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(251, 191, 36, 0.15); }
        
        /* Pricing */
        .pricing { padding: 5rem 5%; text-align: center; }
        .pricing h2 { margin-bottom: 3rem; font-size: 2.2rem; }
        .pricing h2 span { color: var(--gold); }
        .cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
        .card { background: #0d0d0d; padding: 3rem 2rem; border-radius: 25px; width: 300px; border: 1px solid #1a1a1a; }
        .card.featured { border: 2px solid var(--gold); transform: scale(1.05); }
        .price { font-size: 3.2rem; font-weight: 800; margin: 1rem 0; }
        .price small { font-size: 0.9rem; color: #555; }
        .join-btn { display: block; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .gold-btn { background: var(--gold); color: black; }
        .outline-btn { border: 1px solid var(--gold); color: var(--gold); }

        /* Form */
        .register { padding: 5rem 5%; background: #050505; }
        .form-box { max-width: 450px; margin: 0 auto; background: #111; padding: 40px; border-radius: 30px; border: 1px solid #222; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; font-size: 1rem; }
        .submit-btn { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: 800; border-radius: 10px; cursor: pointer; text-transform: uppercase; }

        footer { padding: 40px; text-align: center; color: #222; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">LIFE LINE <span>FITNESS</span></div>
        <a href="tel:0911182141" class="phone-btn"><i class="fas fa-phone"></i> 0911182141</a>
    </nav>

    <section class="video-section">
        <h2 style="margin-bottom: 2rem; font-size: 1.2rem; color: #666;">@lifeline_fitness_lebu</h2>
        <div class="phone-mockup">
            <!-- REAL TIKTOK EMBED -->
            <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@lifeline_fitness_lebu" data-unique-id="lifeline_fitness_lebu" data-embed-type="creator" style="max-width: 780px; min-width: 288px;">
                <section> <a target="_blank" href="https://www.tiktok.com/@lifeline_fitness_lebu?refer=creator_embed">@lifeline_fitness_lebu</a> </section>
            </blockquote>
            <script async src="https://www.tiktok.com/embed.js"></script>
        </div>
    </section>

    <section class="pricing">
        <h2>Pricing <span>Plans</span></h2>
        <div class="cards">
            <div class="card">
                <h3>Monthly Gym</h3>
                <div class="price">5,000<br><small>ETB</small></div>
                <a href="#join" class="join-btn outline-btn">Join Now</a>
            </div>
            <div class="card featured">
                <h3 style="color: var(--gold)">Pro Athlete</h3>
                <div class="price">6,500<br><small>ETB</small></div>
                <a href="#join" class="join-btn gold-btn">Join Now</a>
            </div>
        </div>
    </section>

    <section id="join" class="register">
        <div class="form-box">
            <h2 style="margin-bottom: 20px;">Join the <span>Family</span></h2>
            <form id="gymForm">
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="tel" id="userPhone" placeholder="Phone Number" required>
                <select id="userPlan">
                    <option value="Monthly">Monthly Gym - 5,000 ETB</option>
                    <option value="Pro">Pro Athlete - 6,500 ETB</option>
                </select>
                <button type="submit" class="submit-btn">Submit Registration</button>
            </form>
        </div>
    </section>

    <footer onclick="adminAccess()">
        <p>&copy; 2026 Life Line Fitness Lebu</p>
    </footer>

    <script>
        // Updated Registration logic with requested "Thank You" message
        document.getElementById('gymForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const member = {
                name: name,
                phone: document.getElementById('userPhone').value,
                plan: document.getElementById('userPlan').value
            };
            
            let list = JSON.parse(localStorage.getItem('gymMembers')) || [];
            list.push(member);
            localStorage.setItem('gymMembers', JSON.stringify(list));
            
            // The requested "Call you back" message
            alert("Thanks for registering, " + name + "! We will call you back soon.");
            this.reset();
        });

        let count = 0;
        function adminAccess() {
            count++;
            if(count >= 5) {
                count = 0;
                if(prompt("Enter Admin PIN:") === "admin123") {
                    const data = localStorage.getItem('gymMembers');
                    alert("Leads:\n" + (data ? data : "None."));
                }
            }
        }
    </script>
</body>
</html>
